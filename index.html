<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5档调速桌面小风扇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fan-wrap">
        <!-- 风扇头部 -->
        <div class="fan-head">
            <!-- 后防护网 -->
            <div class="mesh-back"></div>
            <!-- 扇叶 -->
            <div class="fan-blade-box">
                <div class="fan-blade"></div>
            </div>
            <!-- 前防护网 -->
            <div class="mesh-front"></div>
        </div>
        
        <!-- 支柱&按钮 -->
        <div class="fan-pillar">
            <button class="btn power-btn" id="powerBtn">
            </button>
            <button class="btn speed-btn" id="speedBtn">
            </button>
            <!-- 5档指示灯 -->
            <div class="light-group">
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
            </div>
        </div>

        <!-- 底座支架 -->
        <div class="fan-base"></div>
    </div>

    <script src="JavaScript.js"></script>
</body>
</html>
